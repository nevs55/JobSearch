name: Check job links

on:
  schedule:
    - cron: "17 10 1-31/2 * *"   # every other day, ~6am ET
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all job links
        run: node scripts/check-links.mjs
      - name: Commit and publish if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet link-status.json; then
            git add link-status.json
            git commit -m "Update job link status"
            git push origin HEAD:main
          fi
          git push origin HEAD:gh-pages --force
