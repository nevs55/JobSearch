name: Run job research

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12,16,20 * * *"   # 8am / 12pm / 4pm ET daily

permissions:
  contents: write
  id-token: write
  actions: read

concurrency:
  group: research
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require a Claude credential
        env:
          HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' || secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        run: |
          if [ "$HAS_KEY" != "true" ]; then
            echo "::error::To enable on-demand research, add ONE repository secret in Settings > Secrets and variables > Actions: ANTHROPIC_API_KEY (from console.anthropic.com) or CLAUDE_CODE_OAUTH_TOKEN (run 'claude setup-token' on a machine with Claude Code installed)."
            exit 1
          fi

      - name: Research new jobs with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: "--allowedTools Bash,Read,Edit,Write,Glob,Grep,WebFetch,WebSearch --max-turns 300"
          prompt: |
            You are updating Erik Neville's job tracker in this repository checkout. index.html holds the job list in the `J` array (one object per line: r, t, co, tier, tags, remote, m, note, url, src, optional added) and a `COMPANIES` array of tracked companies.

            FIRST read profile.md in the repo root — it contains the current search criteria and, when uploaded, Erik's resume. Derive the target roles, seniority, locations, and focus areas from it (the resume is the primary source of truth when present). Fallback only if profile.md is missing: Senior SA / Pre-Sales SE / TAM, Remote-US or Greater Boston/NE, BCDR/HCI/enterprise storage/virtualization/hybrid cloud/datacenter, at vendors or VARs/MSPs; 20+ yrs multi-vendor infrastructure, NCP/VCP/Pure certs.

            Research CURRENT job openings across the whole market — the tracked companies are a starting point, not a limit. Use web search and fetch career pages / ATS boards directly (Greenhouse boards API https://boards-api.greenhouse.io/v1/boards/{board}/jobs is definitive; Lever: https://api.lever.co/v0/postings/{company}?mode=json; Ashby: https://api.ashbyhq.com/posting-api/job-board/{company}).

            EMERGING-COMPANY DISCOVERY (required each run): evaluate at least 10 companies NOT yet in the COMPANIES array, prioritizing (a) Greater Boston tech companies of any size and (b) new/upcoming startups and growth-stage companies — recent funding rounds, expanding go-to-market teams — in data infrastructure, storage, backup/cyber-resilience, security, cloud, and AI. AI companies are explicitly in scope: AI platforms, model providers, AI infrastructure/tooling (GPU clouds, vector databases, ML data platforms), and applied-AI companies hiring pre-sales SEs/SAs. Hunt via BuiltIn Boston, Wellfound, YC's Work at a Startup, VC portfolio job boards (jobs.accel.com and similar), and recent funding news. Startups title these roles Solutions Engineer / Sales Engineer / Solutions Architect; include early-SE roles where deep enterprise infrastructure experience is the differentiator. Same verification bar applies: only add roles confirmed open on the employer's own site, linked to the official posting.

            For each genuinely new role (not already in J by URL or title+company): append one single-line object to J with the next unused r number, tier 1-3 by fit, tags (vendor|var + bcdr/hci/storage/ne), remote flag, m match %, evidence-based note with comp if listed, url to the OFFICIAL posting (verify on the company site before adding board finds), src describing verification with today's date, and added:"YYYY-MM-DD" (today). Add untracked companies to COMPANIES too.

            MANDATORY WORK — third-party link conversion. This is not optional and "no changes needed" is not an acceptable outcome while any of these remain: list every job in J whose url hostname is one of builtin.com, indeed.com, glassdoor.com, ziprecruiter.com, linkedin.com, dice.com, snagajob.com, jobgether.com, adzuna.com, tealhq.com, wellfound.com, remoterocketship.com, accel.com, insightpartners.com, dejobs.org. Work through EVERY one of them, one at a time: search the employer's own ATS (try the Greenhouse boards API https://boards-api.greenhouse.io/v1/boards/{board}/jobs with likely board slugs, Lever at https://api.lever.co/v0/postings/{company}?mode=json, the company careers page, and web search for the exact title + company). Outcome per job, applied to index.html: (a) role found open on the employer's site -> REPLACE url with the direct official posting URL and update src with today's date; (b) employer's site has no such opening -> REMOVE the job from J and fix the company's COMPANIES entry; (c) genuinely unresolvable after a real attempt -> append a note dated today saying so. Count how many you processed and include the tally in your commit message. Do not finish the run while unprocessed third-party links remain and you have budget left.

            CONTACT PERSON: for every new role you add — and opportunistically for existing tier-1 roles missing one — try to identify a real, verifiable recruiting contact: a named recruiter/talent partner or hiring manager shown on the posting itself, the company's careers/team pages, or surfaced by web search (e.g. "COMPANY recruiter sales engineering"). When found with reasonable confidence, set contact:"Full Name — title" on the job object, and set cemail ONLY to an email address actually published somewhere — NEVER guess or construct email addresses. If only a general recruiting inbox is published (talent@..., careers@...), use it with contact noting it is the general recruiting inbox. If nothing verifiable exists, leave the fields absent. Mention where the contact was found in the job's src or note.

            Then run: node scripts/check-links.mjs

            Finally commit everything with a clear message and push to origin main. Keep the diff minimal; never reformat unrelated code. NEVER modify an existing job's added:"YYYY-MM-DD" value — it permanently records the day that job was discovered.

      - name: Publish to gh-pages
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin main
          git checkout -f origin/main
          if node scripts/make-demo.mjs && ! git diff --quiet demo.html; then
            git add demo.html
            git commit -m "Regenerate demo.html"
            git push origin HEAD:main
          fi
          git push origin HEAD:gh-pages --force
