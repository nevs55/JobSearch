<style>

    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 28px 16px 64px;
  }

  header {
    max-width: 980px;
    margin: 0 auto 28px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
  }
  .h-left h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.85rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #fff;
  }

  .h-left p {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.09em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .stats { display: flex; gap: 22px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-n {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .stat-l {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-top: 2px;
  }

  /* FILTERS */
  .filter-bar {
    max-width: 980px;
    margin: 0 auto 20px;
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.64rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-right: 4px;
  }

    font-family: 'DM Mono', monospace;
    font-size: 0.67rem;
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.14s;
    text-transform: uppercase;
    letter-spacing: 0.06em;

  .fb.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }

    max-width: 980px;
    margin: 0 auto;
    display: grid;
    gap: 10px;
  }

  .jcard {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    gap: 0;
    cursor: default;
    transition: border-color 0.14s, background 0.14s;

  .jright { grid-column: 2; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; min-width: 130px; }

    color: #fff;

    align-items: center;
    gap: 7px;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;

  .mfill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }

  .jfooter {
    grid-column: 1 / 3;
    margin-top: 12px;
    padding-top: 11px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;

function tierLabel(t) {
  if(t===1) return {cls:"t1",txt:"🔥 Strong Fit"};
  if(t===2) return {cls:"t2",txt:"✦ Good Fit"};
  return {cls:"t3",txt:"◈ Stretch"};
}

function updateStats(list) {
  document.getElementById("s-total").textContent = list.length;
  document.getElementById("s-t1").textContent   = list.filter(j=>j.tier===1).length;
  document.getElementById("s-ne").textContent   = list.filter(j=>j.tags.includes("boston")).length;
  document.getElementById("s-rem").textContent  = list.filter(j=>j.remote).length;
}

function render(filter) {
  const filtered = filter==="all" ? jobs : jobs.filter(j=>j.tags.includes(filter));
  updateStats(filtered);
  const el = document.getElementById("job-list");
  if(!filtered.length){ el.innerHTML='<div class="empty">No roles match this filter.</div>'; return; }

  el.innerHTML = filtered.map((j,i) => {
    const tl = tierLabel(j.tier);
    const ne  = j.tags.includes("boston") ? `<span class="tag b">NE/Boston</span>` : "";
    const rem = j.remote ? `<span class="tag r">Remote-ok</span>` : "";
    const typetag = j.tags.includes("vendor")
      ? `<span class="tag">Vendor-Direct</span>`
      : `<span class="tag">VAR/MSP</span>`;
    const extras = j.tags
      .filter(t=>!["boston","vendor","var"].includes(t))
      .map(t=>`<span class="tag">${t.toUpperCase()}</span>`).join("");

    return `
    <div class="jcard" style="animation-delay:${i*0.035}s">
      <div class="jmain">
        <div class="jtitle"><span class="jrank">#${j.rank}</span>${j.title}</div>
        <div class="jco">${j.co}</div>
      </div>
      <div class="jright">
        <span class="tier-badge ${tl.cls}">${tl.txt}</span>
        <div class="match-row">
          <div class="mbar"><div class="mfill" style="width:${j.match}%"></div></div>
          <span>${j.match}%</span>
        </div>
      </div>
      <div class="jfooter">
        <span class="jnote">${j.note}</span>
        <div class="jactions">
          <div class="jtags">${typetag}${ne}${rem}${extras}</div>
          <a class="alink" href="${j.url}" target="_blank">View / Apply →</a>
        </div>
      </div>
    </div>`;
  }).join("");
}

document.querySelector(".filter-bar").addEventListener("click", e => {
  const btn = e.target.closest(".fb");
  if(!btn) return;
  document.querySelectorAll(".fb").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render(btn.dataset.f);
});

render("all");
</script>
</body>
</html>
