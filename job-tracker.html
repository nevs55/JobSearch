<html lang="en">
<head>
<meta charset="UTF-8">

<title>Erik Neville | Job Tracker 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e14;
    --surface: #12161f;
    --card: #181d28;
    --border: #232a38;
    --accent: #00d4aa;
    --accent2: #f5a623;
    --accent3: #e05a5a;
    --text: #dce3ef;
    --muted: #7a8499;
    --tier1: #00d4aa;
    --tier2: #5b9cf6;
    --tier3: #a084e8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 32px 20px 60px;
  }

  header {
    max-width: 960px;
    margin: 0 auto 36px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header-left h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #fff;
  }

  .header-left h1 span { color: var(--accent); }

  .header-left p {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-n {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--accent);
  }

  .stat-l {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .filters {
    max-width: 960px;
    margin: 0 auto 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }

  #job-list {
    max-width: 960px;
    margin: 0 auto;
    display: grid;
    gap: 12px;
  }

  .job-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px;
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto auto;
    gap: 10px 16px;
    transition: border-color 0.15s, transform 0.15s;
    animation: fadeUp 0.3s ease both;
  }

  .job-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .job-main { grid-column: 1; }

  .job-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 2px;
  }

  .job-company {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .job-right {
    grid-column: 2;
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .tier-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    white-space: nowrap;
  }

  .tier1 { background: rgba(0,212,170,0.15); color: var(--tier1); border: 1px solid rgba(0,212,170,0.3); }
  .tier2 { background: rgba(91,156,246,0.15); color: var(--tier2); border: 1px solid rgba(91,156,246,0.3); }
  .tier3 { background: rgba(160,132,232,0.15); color: var(--tier3); border: 1px solid rgba(160,132,232,0.3); }

  .match-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .match-bar {
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .match-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .job-meta {
    grid-column: 1 / 3;
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.5;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .job-note { flex: 1; min-width: 200px; }

  .job-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    align-items: flex-start;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    padding: 2px 8px;
    border-radius: 3px;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .tag.remote { color: var(--accent2); border-color: rgba(245,166,35,0.3); }
  .tag.boston { color: #7ec8e3; border-color: rgba(126,200,227,0.3); }

  .apply-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--accent);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
    opacity: 0.8;
    transition: opacity 0.15s;
  }

  .apply-link:hover { opacity: 1; text-decoration: underline; }

  .rank-num {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    color: var(--border);
    font-weight: 800;
    letter-spacing: 0.05em;
    align-self: center;
  }

  .no-results {
    text-align: center;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 40px 0;
  }
</style>

function getTierLabel(t) {
  if (t === 1) return { cls: "tier1", text: "🔥 Strong Fit" };
  if (t === 2) return { cls: "tier2", text: "✦ Good Fit" };
  return { cls: "tier3", text: "◈ Stretch" };
}

function countStats(list) {
  let t1=0, bos=0, rem=0;
  list.forEach(j => {
    if(j.tier===1) t1++;
    if(j.tags.includes("boston")) bos++;
    if(j.remote) rem++;
  });
  return { t1, bos, rem };
}

function render(filter) {
  const filtered = filter === "all" ? jobs : jobs.filter(j => j.tags.includes(filter));
  const { t1, bos, rem } = countStats(filtered);
  document.getElementById("s-total").textContent = filtered.length;
  document.getElementById("s-t1").textContent = t1;
  document.getElementById("s-boston").textContent = bos;
  document.getElementById("s-remote").textContent = rem;

  const list = document.getElementById("job-list");
  if (!filtered.length) {
    list.innerHTML = '<div class="no-results">No roles match this filter.</div>';
    return;
  }

  list.innerHTML = filtered.map((j, i) => {
    const tier = getTierLabel(j.tier);
    const remTag = j.remote ? `<span class="tag remote">Remote-ok</span>` : "";
    const bTag = j.tags.includes("boston") ? `<span class="tag boston">NE/Boston</span>` : "";
    const extraTags = j.tags
      .filter(t => t !== "boston" && t !== "vendor" && t !== "var")
      .map(t => `<span class="tag">${t.toUpperCase()}</span>`).join("");
    const typeTag = j.tags.includes("vendor")
      ? `<span class="tag">Vendor-Direct</span>`
      : j.tags.includes("var")
      ? `<span class="tag">VAR/MSP</span>` : "";

    return `
    <div class="job-card" style="animation-delay:${i*0.04}s">
      <div class="job-main">
        <div class="job-title">#${j.rank} — ${j.title}</div>
        <div class="job-company">${j.company}</div>
      </div>
      <div class="job-right">
        <span class="tier-badge ${tier.cls}">${tier.text}</span>
        <div class="match-wrap">
          <div class="match-bar"><div class="match-fill" style="width:${j.match}%"></div></div>
          <span>${j.match}%</span>
        </div>
      </div>
      <div class="job-meta">
        <span class="job-note">${j.note}</span>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
          <div class="job-tags">${typeTag}${bTag}${remTag}${extraTags}</div>
          <a class="apply-link" href="${j.url}" target="_blank">View / Apply →</a>
        </div>
      </div>
    </div>`;
  }).join("");
}

document.querySelector(".filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render(btn.dataset.filter);
});

render("all");
</script>
